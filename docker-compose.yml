services:
  app:
    image: boardgames-app:latest
    build:
      context: .
    ports:
      - "8000:8000"
    volumes:
      - ./:/boardgames
    command: >
      sh -c "python manage.py wait_for_db &&
             python manage.py migrate &&
             sleep infinity"
    environment:
      - DB_HOST=db
      - DB_NAME=boardgames
      - DB_USER=devuser
      - DB_PASSWORD=devpass
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    volumes:
      - dev-db-data:/var/lib/postgresql/data
    container_name: boardgames-db
    environment:
      - POSTGRES_DB=boardgames
      - POSTGRES_USER=devuser
      - POSTGRES_PASSWORD=devpass

volumes:
  dev-db-data:
    driver: local

