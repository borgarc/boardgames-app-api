[tool.ruff]
line-length = 88
target-version = "py311"

exclude = [
    ".git",
    "__pycache__",
    "venv",
    ".venv",
    "migrations",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S101"]

[tool.pyright]
include = ["."]
extraPaths = ["/usr/local/lib/python3.11/site-packages"]
typeCheckingMode = "basic"
pythonVersion = "3.11"
